server.port=8080

# OpenWeatherMap API Configuration
openweather.api.key=${OPENWEATHER_API_KEY}
openweather.api.base-url=https://api.openweathermap.org/data/2.5
openweather.api.forecast-url=https://api.openweathermap.org/data/3.0/onecall

# Application settings
spring.application.name=weather-dialogflow-bot

# Logging
logging.level.com.weatherbot=DEBUG
logging.level.org.springframework.web=INFO